<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVACORE AI</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #ffae00;
  --gold-dim: rgba(255,174,0,0.15);
  --gold-mid: rgba(255,174,0,0.4);
  --orange: #ff6a00;
  --green: #00ffaa;
  --green-dim: rgba(0,255,170,0.08);
  --bg: #020509;
  --panel-bg: rgba(2,5,9,0.97);
}

body {
  margin: 0;
  height: 100vh;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Rajdhani', sans-serif;
  overflow: hidden;
  color: var(--gold);
  position: relative;
}

/* Animated background grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,174,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,174,0,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: gridPulse 8s ease-in-out infinite;
  pointer-events: none;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 30%, #000 80%);
  pointer-events: none;
}

@keyframes gridPulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* Floating particles */
.particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.particle {
  position: absolute;
  width: 2px;
  height: 2px;
  background: var(--gold);
  border-radius: 50%;
  animation: float linear infinite;
  opacity: 0;
}

@keyframes float {
  0% { transform: translateY(100vh) translateX(0); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.3; }
  100% { transform: translateY(-10px) translateX(30px); opacity: 0; }
}

/* Main layout */
.layout {
  display: flex;
  width: 100vw;
  height: 100vh;
  position: relative;
  z-index: 1;
}

/* Left panel - main AI interface */
.main-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 28px;
  padding: 40px;
  position: relative;
}

/* Header */
.header {
  text-align: center;
  position: absolute;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
}

.header h1 {
  font-family: 'Orbitron', monospace;
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 12px;
  color: var(--gold);
  text-shadow: 0 0 30px rgba(255,174,0,0.6), 0 0 60px rgba(255,174,0,0.2);
  animation: titlePulse 4s ease-in-out infinite;
}

.header .subtitle {
  font-size: 11px;
  letter-spacing: 6px;
  color: rgba(255,174,0,0.4);
  margin-top: 4px;
  font-weight: 300;
  text-transform: uppercase;
}

@keyframes titlePulse {
  0%, 100% { text-shadow: 0 0 30px rgba(255,174,0,0.6), 0 0 60px rgba(255,174,0,0.2); }
  50% { text-shadow: 0 0 50px rgba(255,174,0,0.9), 0 0 100px rgba(255,174,0,0.4); }
}

/* Core orb */
.core-wrapper {
  position: relative;
  width: 260px;
  height: 260px;
  margin-top: 40px;
}

.ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid var(--gold-mid);
  animation: rotate 12s linear infinite;
}

.ring::before {
  content: '';
  position: absolute;
  width: 8px;
  height: 8px;
  background: var(--gold);
  border-radius: 50%;
  top: -4px;
  left: 50%;
  transform: translateX(-50%);
  box-shadow: 0 0 10px var(--gold), 0 0 20px var(--gold);
}

.ring-1 {
  inset: 0;
  animation-duration: 14s;
  border-color: rgba(255,174,0,0.5);
  box-shadow: 0 0 15px rgba(255,174,0,0.1);
}

.ring-2 {
  inset: 25px;
  animation-duration: 9s;
  animation-direction: reverse;
  border-color: rgba(255,106,0,0.4);
  border-style: dashed;
}

.ring-2::before { background: var(--orange); box-shadow: 0 0 10px var(--orange); }

.ring-3 {
  inset: 50px;
  animation-duration: 6s;
  border-color: rgba(255,174,0,0.3);
}

.ring-3::before { width: 5px; height: 5px; top: -2.5px; }

.core-center {
  position: absolute;
  width: 90px;
  height: 90px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle at 35% 35%, #fff8e7, #ffae00 40%, #ff6a00 80%, #8b2200);
  border-radius: 50%;
  box-shadow:
    0 0 30px rgba(255,174,0,0.8),
    0 0 60px rgba(255,106,0,0.5),
    0 0 100px rgba(255,106,0,0.2),
    inset 0 0 20px rgba(255,255,200,0.3);
  transition: all 0.4s ease;
  cursor: pointer;
}

.core-center::after {
  content: '';
  position: absolute;
  inset: 10px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 30%, rgba(255,255,255,0.4), transparent 60%);
}

.listening .core-center {
  transform: translate(-50%, -50%) scale(1.25);
  box-shadow:
    0 0 60px rgba(255,174,0,1),
    0 0 120px rgba(255,106,0,0.8),
    0 0 200px rgba(255,106,0,0.4);
  animation: pulse 0.8s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1.25); }
  50% { transform: translate(-50%, -50%) scale(1.35); }
}

@keyframes rotate {
  to { transform: rotate(360deg); }
}

/* Status indicator */
.status-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  letter-spacing: 3px;
  color: rgba(255,174,0,0.5);
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: blink 2s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}

/* Mode toggle */
.mode-toggle {
  display: flex;
  gap: 0;
  border: 1px solid var(--gold-mid);
  overflow: hidden;
  border-radius: 2px;
}

.mode-btn {
  padding: 8px 24px;
  background: transparent;
  border: none;
  color: rgba(255,174,0,0.4);
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
}

.mode-btn.active {
  background: var(--gold-dim);
  color: var(--gold);
  box-shadow: inset 0 0 20px rgba(255,174,0,0.1);
}

.mode-btn:hover:not(.active) {
  color: rgba(255,174,0,0.7);
  background: rgba(255,174,0,0.05);
}

/* Controls */
.controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  width: 100%;
  max-width: 320px;
}

.btn-primary {
  width: 100%;
  padding: 14px;
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  letter-spacing: 4px;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
  clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
}

.btn-primary::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--gold);
  transform: translateX(-100%);
  transition: transform 0.3s ease;
}

.btn-primary:hover::before { transform: translateX(0); }
.btn-primary:hover { color: #000; box-shadow: 0 0 30px rgba(255,174,0,0.5); }
.btn-primary span { position: relative; z-index: 1; }

.text-input-group {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.text-input {
  width: 100%;
  padding: 12px 16px;
  background: rgba(255,174,0,0.03);
  border: 1px solid rgba(255,174,0,0.3);
  border-bottom-color: var(--gold);
  color: var(--gold);
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  letter-spacing: 1px;
  outline: none;
  transition: all 0.3s;
}

.text-input::placeholder { color: rgba(255,174,0,0.25); letter-spacing: 2px; font-size: 12px; }
.text-input:focus {
  background: rgba(255,174,0,0.06);
  border-color: var(--gold);
  box-shadow: 0 0 20px rgba(255,174,0,0.1), inset 0 0 20px rgba(255,174,0,0.03);
}

/* Terminal panel */
.terminal-panel {
  width: 380px;
  height: 100vh;
  background: var(--panel-bg);
  border-left: 1px solid rgba(0,255,170,0.2);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

.terminal-panel::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--green-dim);
  pointer-events: none;
}

/* Scanline effect */
.terminal-panel::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,255,170,0.015) 2px,
    rgba(0,255,170,0.015) 4px
  );
  pointer-events: none;
  z-index: 1;
}

.terminal-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid rgba(0,255,170,0.15);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  background: rgba(0,255,170,0.03);
}

.terminal-title {
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--green);
  text-shadow: 0 0 10px rgba(0,255,170,0.5);
}

.terminal-dots {
  display: flex;
  gap: 6px;
}

.t-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.t-dot:nth-child(1) { background: #ff5f57; }
.t-dot:nth-child(2) { background: #febc2e; }
.t-dot:nth-child(3) { background: #28c840; }

.terminal-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  color: var(--green);
  line-height: 1.7;
  position: relative;
  z-index: 2;
  scrollbar-width: thin;
  scrollbar-color: rgba(0,255,170,0.2) transparent;
}

.terminal-body::-webkit-scrollbar { width: 4px; }
.terminal-body::-webkit-scrollbar-track { background: transparent; }
.terminal-body::-webkit-scrollbar-thumb { background: rgba(0,255,170,0.2); border-radius: 2px; }

.terminal-line {
  margin-bottom: 12px;
  animation: termFadeIn 0.3s ease-out;
  position: relative;
  padding-left: 0;
}

.line-user {
  color: rgba(255,174,0,0.85);
}

.line-user::before {
  content: '▶ USER';
  display: block;
  font-size: 9px;
  letter-spacing: 3px;
  color: rgba(255,174,0,0.4);
  margin-bottom: 3px;
  font-family: 'Orbitron', monospace;
}

.line-nova {
  color: rgba(0,255,170,0.9);
  border-left: 2px solid rgba(0,255,170,0.3);
  padding-left: 12px;
}

.line-nova::before {
  content: '◆ NOVACORE';
  display: block;
  font-size: 9px;
  letter-spacing: 3px;
  color: rgba(0,255,170,0.4);
  margin-bottom: 3px;
  font-family: 'Orbitron', monospace;
}

.line-system {
  color: rgba(255,174,0,0.3);
  font-size: 11px;
  letter-spacing: 2px;
  text-align: center;
  border-top: 1px solid rgba(255,174,0,0.08);
  border-bottom: 1px solid rgba(255,174,0,0.08);
  padding: 6px 0;
  margin: 16px 0;
}

.line-error {
  color: #ff4444;
  border-left: 2px solid rgba(255,68,68,0.4);
  padding-left: 12px;
}

.line-error::before {
  content: '⚠ ERROR';
  display: block;
  font-size: 9px;
  letter-spacing: 3px;
  color: rgba(255,68,68,0.5);
  margin-bottom: 3px;
  font-family: 'Orbitron', monospace;
}

@keyframes termFadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.typing-indicator {
  display: none;
  align-items: center;
  gap: 4px;
  padding-left: 14px;
  margin-bottom: 12px;
}

.typing-indicator.visible { display: flex; }

.typing-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--green);
  animation: typingBounce 1.2s ease-in-out infinite;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

.terminal-footer {
  padding: 12px 24px;
  border-top: 1px solid rgba(0,255,170,0.1);
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  color: rgba(0,255,170,0.2);
  letter-spacing: 2px;
  display: flex;
  justify-content: space-between;
  flex-shrink: 0;
}

/* Corner decorations */
.corner {
  position: absolute;
  width: 20px;
  height: 20px;
  border-color: rgba(255,174,0,0.3);
  border-style: solid;
}
.corner-tl { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
.corner-tr { top: 10px; right: 10px; border-width: 1px 1px 0 0; }
.corner-bl { bottom: 10px; left: 10px; border-width: 0 0 1px 1px; }
.corner-br { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }

</style>
</head>
<body>

<!-- Particles -->
<div class="particles" id="particles"></div>

<div class="layout">

  <!-- Main AI Panel -->
  <div class="main-panel">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="header">
      <h1>NOVACORE</h1>
      <div class="subtitle">Artificial Intelligence System v3.0</div>
    </div>

    <div class="core-wrapper" id="aiCore">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <div class="core-center"></div>
    </div>

    <div class="status-bar">
      <div class="status-dot"></div>
      <span>SYSTEMS ONLINE</span>
    </div>

    <div class="mode-toggle">
      <button class="mode-btn active" id="btnVoice" onclick="setMode('voice')">⬤ VOICE</button>
      <button class="mode-btn" id="btnText" onclick="setMode('text')">⌨ TEXT</button>
    </div>

    <div class="controls">
      <div id="voiceArea">
        <button class="btn-primary" onclick="startListening()"><span>INITIALIZE VOICE</span></button>
      </div>

      <div id="textInputArea" style="display:none" class="text-input-group">
        <input
          type="text"
          class="text-input"
          id="textCommand"
          placeholder="ENTER COMMAND..."
          onkeydown="if(event.key==='Enter') sendTextCommand()"
        />
        <button class="btn-primary" onclick="sendTextCommand()"><span>TRANSMIT</span></button>
      </div>
    </div>

  </div>

  <!-- Terminal Panel -->
  <div class="terminal-panel">
    <div class="terminal-header">
      <span class="terminal-title">NEURAL LOG</span>
      <div class="terminal-dots">
        <div class="t-dot"></div>
        <div class="t-dot"></div>
        <div class="t-dot"></div>
      </div>
    </div>

    <div class="terminal-body" id="terminalBody">
      <div class="terminal-line line-system">— SYSTEM INITIALIZED —</div>
      <div class="terminal-line line-system">AWAITING INPUT...</div>
      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>

    <div class="terminal-footer">
      <span id="msgCount">MSG: 0</span>
      <span id="timeDisplay">--:--:--</span>
    </div>
  </div>

</div>

<script>
// ── Particles ──────────────────────────────────────────
(function spawnParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (8 + Math.random() * 15) + 's';
    p.style.animationDelay = (Math.random() * 15) + 's';
    p.style.width = p.style.height = (Math.random() > 0.7 ? 3 : 2) + 'px';
    container.appendChild(p);
  }
})();

// ── Clock ───────────────────────────────────────────────
setInterval(() => {
  const now = new Date();
  document.getElementById('timeDisplay').textContent =
    now.toTimeString().slice(0, 8);
}, 1000);

// ── Message counter ─────────────────────────────────────
let msgCount = 0;
function incMsg() {
  msgCount++;
  document.getElementById('msgCount').textContent = 'MSG: ' + msgCount;
}

// ── Mode toggle ─────────────────────────────────────────
function setMode(mode) {
  document.getElementById('btnVoice').classList.toggle('active', mode === 'voice');
  document.getElementById('btnText').classList.toggle('active', mode === 'text');
  document.getElementById('voiceArea').style.display = mode === 'voice' ? 'block' : 'none';
  document.getElementById('textInputArea').style.display = mode === 'text' ? 'flex' : 'none';
}

// ── Terminal helpers ────────────────────────────────────
function appendLine(text, type = 'nova') {
  const body = document.getElementById('terminalBody');
  const indicator = document.getElementById('typingIndicator');

  const line = document.createElement('div');
  line.className = 'terminal-line line-' + type;
  line.textContent = text;

  body.insertBefore(line, indicator);
  body.scrollTop = body.scrollHeight;
  incMsg();
}

function setTyping(visible) {
  document.getElementById('typingIndicator').classList.toggle('visible', visible);
  const body = document.getElementById('terminalBody');
  body.scrollTop = body.scrollHeight;
}

// ── Strip markdown code fences ──────────────────────────
function cleanResponse(text) {
  // Remove ```html ... ```, ```json ... ```, ``` ... ``` etc.
  return text
    .replace(/```[\w]*\n?/g, '')
    .replace(/```/g, '')
    .trim();
}

// ── Send to backend ─────────────────────────────────────
async function sendToBackend(text) {
  setTyping(true);

  try {
    const res = await fetch('/api/voice/process-text', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });

    const raw = await res.text();

    // Try JSON parse first (in case backend wraps response)
    let message = raw;
    try {
      const parsed = JSON.parse(raw);
      message = parsed.message || parsed.response || parsed.content || raw;
    } catch (_) {
      // raw text is fine
    }

    message = cleanResponse(message);
    setTyping(false);
    appendLine(message, 'nova');

    const mode = document.getElementById('btnVoice').classList.contains('active') ? 'voice' : 'text';
    if (mode === 'voice') {
      const utter = new SpeechSynthesisUtterance(message);
      utter.lang = 'en-US';
      utter.rate = 1;
      window.speechSynthesis.speak(utter);
    }

  } catch (err) {
    setTyping(false);
    appendLine('Connection failure: ' + err.message, 'error');
  }
}

// ── Text mode ───────────────────────────────────────────
function sendTextCommand() {
  const input = document.getElementById('textCommand');
  const text = input.value.trim();
  if (!text) return;
  appendLine(text, 'user');
  input.value = '';
  sendToBackend(text);
}

// ── Voice mode ──────────────────────────────────────────
function startListening() {
  const core = document.getElementById('aiCore');
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    appendLine('Speech recognition not supported in this browser.', 'error');
    return;
  }

  core.classList.add('listening');
  appendLine('Listening...', 'system');

  const recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.start();

  recognition.onresult = function(event) {
    const text = event.results[0][0].transcript;
    core.classList.remove('listening');
    appendLine(text, 'user');
    sendToBackend(text);
  };

  recognition.onerror = function(e) {
    core.classList.remove('listening');
    appendLine('Voice error: ' + e.error, 'error');
  };

  recognition.onend = function() {
    core.classList.remove('listening');
  };
}
</script>

</body>
</html>
